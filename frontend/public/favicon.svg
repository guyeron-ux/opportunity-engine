<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Violet rounded background — visible on any browser theme -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9"/>
  <!-- Crosshair arms -->
  <line x1="16" y1="4"  x2="16" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="16" y1="22" x2="16" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="4"  y1="16" x2="10" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="22" y1="16" x2="28" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="white"/>
</svg>
