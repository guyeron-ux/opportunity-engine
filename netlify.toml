[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://opportunity-engine-z2qq.onrender.com"
  VITE_WS_URL  = "wss://opportunity-engine-z2qq.onrender.com/ws"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
